# Uncomment to enable encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Avalanche OLED Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
# CONFIG_ZMK_WIDGET_WPM_STATUS=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Turn the OLED off when the keyboard is idle so it stops drawing power
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Bluetooth: drop TX power from +8 dBm to the default 0 dBm.
# +8 only helps if the host is far away; for a keyboard next to your laptop
# it just burns battery.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=n
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Deep sleep: cuts idle current to ~uA. First keypress wakes it (1-2s reconnect).
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# unklocking zmk-studio
CONFIG_ZMK_STUDIO_LOCKING=n
